# Repository settings applied via GitHub REST API by .github/workflows/apply-settings-and-rulesets.yml
# This repo uses GitFlow: develop is default, main is stable release.

description: "Read-only viewer for WinCC OA .pnl panel files with structure tree, properties, scripts, and preview launcher."
homepage: "https://github.com/winccoa-tools-pack"
default_branch: "develop"

has_issues: true
has_wiki: false

allow_squash_merge: true
allow_merge_commit: true
allow_rebase_merge: false
allow_auto_merge: true

delete_branch_on_merge: true

topics:
  - winccoa
  - wincc-oa
  - vscode
  - automation
  - vscode-extension
  - scada
  - hmi
  - industrial-automation
  - Siemens
  - ETM
  - winccoa-ui
  - winccoa-panel-viewer
  - winccoa-panel-linter
  - winccoa-panel-inspector

security:
  enable_vulnerability_alerts: true
  enable_automated_security_fixes: true
